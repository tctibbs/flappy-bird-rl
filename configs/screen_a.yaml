# Screening config A: bounded rewards (DQN-style reward clipping rationale),
# lower learning rate, smaller network.

name: screen_a_bounded_reward

env:
  reward_alive: 0.1
  reward_death: -1.0
  max_episode_steps: 10000
  randomize_sprites: false

dqn:
  policy: MlpPolicy
  learning_rate: 0.0001
  buffer_size: 100000
  learning_starts: 5000
  batch_size: 64
  gamma: 0.99
  train_freq: 4
  gradient_steps: 1
  target_update_interval: 1000
  exploration_fraction: 0.1
  exploration_final_eps: 0.01
  net_arch: [64, 64]

train:
  total_timesteps: 1000000
  seed: 0
  eval_every_steps: 50000
  eval_episodes: 20

evaluation:
  n_episodes: 100
  seed_base: 10000
