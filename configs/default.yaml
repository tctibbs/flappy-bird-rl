# Baseline DQN configuration. Schema: reinforced_flapper.config.RunConfig.
# Every field is validated on load; unknown fields are rejected.

name: dqn_baseline

env:
  reward_alive: 1.0
  reward_death: -100.0
  max_episode_steps: 10000
  randomize_sprites: false

dqn:
  policy: MlpPolicy
  learning_rate: 0.0003
  buffer_size: 100000
  learning_starts: 5000
  batch_size: 64
  gamma: 0.99
  train_freq: 4
  gradient_steps: 1
  target_update_interval: 1000
  exploration_fraction: 0.2
  exploration_final_eps: 0.02
  net_arch: [256, 256]

train:
  total_timesteps: 300000
  seed: 0
  eval_every_steps: 20000
  eval_episodes: 20

evaluation:
  n_episodes: 100
  seed_base: 10000
